# Production profile — activate with SPRING_PROFILES_ACTIVE=prod (set on Railway)

server.port=${PORT:8080}
server.forward-headers-strategy=framework
server.error.include-message=never
server.error.include-stacktrace=never
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# Database: set SPRING_DATASOURCE_* or Railway DATABASE_URL (parsed automatically)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${PGUSER:}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:}}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.thymeleaf.cache=true

# No demo users or default passwords in production
app.seed.users.enabled=false
app.seed.catalog.enabled=${APP_SEED_CATALOG:true}

# JWT: set APP_JWT_SECRET in Railway (min 32 characters; openssl rand -base64 48)
# Admin: set APP_SEED_ADMIN_PASSWORD only when creating the first admin user

# PayPal via environment (use live credentials only when paypal.mode=live)
paypal.client-id=${PAYPAL_CLIENT_ID:}
paypal.client-secret=${PAYPAL_CLIENT_SECRET:}
paypal.mode=${PAYPAL_MODE:sandbox}
