spring.application.name=JavaWebPrj

spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.jpa.properties.hibernate.format_sql=true
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}

paypal.mode=${PAYPAL_MODE:sandbox}
paypal.currency=${PAYPAL_CURRENCY:EUR}

app.seed.catalog.enabled=${APP_SEED_CATALOG:true}
app.seed.users.enabled=${APP_SEED_USERS:false}
app.seed.admin.username=${APP_SEED_ADMIN_USERNAME:admin}
app.seed.admin.email=${APP_SEED_ADMIN_EMAIL:admin@shop.local}
app.seed.customer.username=${APP_SEED_CUSTOMER_USERNAME:customer}
app.seed.customer.email=${APP_SEED_CUSTOMER_EMAIL:customer@shop.local}
