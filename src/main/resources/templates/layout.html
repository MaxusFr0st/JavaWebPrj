<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title}">Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link th:href="@{/css/app.css}" rel="stylesheet"/>
</head>
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">JavaWeb Shop</a>
        <div class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
            <a class="nav-link" th:href="@{/shop/categories}">Categories</a>
            <a class="nav-link" th:href="@{/cart}">Cart
                <span id="cart-badge" class="badge bg-light text-dark" th:text="${cartItemCount}">0</span>
            </a>
            <span sec:authorize="isAuthenticated()">
                <a class="nav-link" th:href="@{/account/orders}">My orders</a>
                <a class="nav-link" sec:authorize="hasRole('ADMIN')" th:href="@{/admin}">Admin</a>
            </span>
            <span sec:authorize="!isAuthenticated()">
                <a class="nav-link" th:href="@{/login}">Login</a>
                <a class="nav-link" th:href="@{/register}">Register</a>
            </span>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="text-center text-muted py-4 mt-5 border-top">
    <div class="container">
        <small>Java Web Programming — Individual project</small>
    </div>
</footer>

<script th:fragment="scripts" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/cart.js}"></script>
</body>
</html>
