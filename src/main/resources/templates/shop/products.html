<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Products')}"></head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<main class="container">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/shop/categories}">Categories</a></li>
            <li class="breadcrumb-item active" th:text="${category.name}">Category</li>
        </ol>
    </nav>

    <h1 class="mb-4" th:text="${category.name}">Products</h1>
    <p class="text-muted" th:if="${category.description}" th:text="${category.description}"></p>

    <div th:if="${#lists.isEmpty(products)}" class="alert alert-info">No products in this category.</div>

    <div class="table-responsive" th:unless="${#lists.isEmpty(products)}">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>Name</th>
                <th>Price</th>
                <th>In stock</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${products}">
                <td th:text="${p.name}">Product</td>
                <td th:text="${#numbers.formatDecimal(p.price, 1, 2)} + ' €'">0.00 €</td>
                <td th:text="${p.stock}">0</td>
                <td class="text-nowrap">
                    <a class="btn btn-sm btn-outline-secondary"
                       th:href="@{/shop/products/{id}(id=${p.id})}">Details</a>
                    <form th:if="${p.stock > 0}" th:action="@{/cart/add}" method="post" class="d-inline">
                        <input type="hidden" name="productId" th:value="${p.id}"/>
                        <input type="hidden" name="quantity" value="1"/>
                        <button type="submit" class="btn btn-sm btn-primary">Add</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<div th:replace="~{layout :: footer}"></div>
<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
