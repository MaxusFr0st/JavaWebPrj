<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Home')}"></head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<main class="container">
    <div class="p-5 mb-4 bg-light rounded-3">
        <h1 class="display-5">Welcome to JavaWeb Shop</h1>
        <p class="lead">Browse categories, add items to your cart (no login required), and checkout when you register.</p>
        <a class="btn btn-primary btn-lg" th:href="@{/shop/categories}">Start shopping</a>
    </div>
</main>

<div th:replace="~{layout :: footer}"></div>
<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
