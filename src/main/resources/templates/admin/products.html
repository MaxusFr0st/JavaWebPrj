<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Admin products')}"></head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<div th:replace="~{admin/fragments/nav :: admin-nav}"></div>

<main class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Products</h1>
        <a class="btn btn-primary" th:href="@{/admin/products/new}">Add product</a>
    </div>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="table-responsive">
        <table class="table table-striped align-middle">
            <thead>
            <tr><th>ID</th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th></th></tr>
            </thead>
            <tbody>
            <tr th:each="p : ${products}">
                <td th:text="${p.id}">1</td>
                <td th:text="${p.name}">Name</td>
                <td th:text="${p.category.name}">Cat</td>
                <td th:text="${#numbers.formatDecimal(p.price, 1, 2)} + ' €'">0</td>
                <td th:text="${p.stock}">0</td>
                <td class="text-end text-nowrap">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/admin/products/{id}/edit(id=${p.id})}">Edit</a>
                    <form th:action="@{/admin/products/{id}/delete(id=${p.id})}" method="post" class="d-inline"
                          onsubmit="return confirm('Delete this product?');">
                        <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<div th:replace="~{layout :: footer}"></div>
<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
