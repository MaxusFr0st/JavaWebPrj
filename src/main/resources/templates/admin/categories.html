<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Admin categories')}"></head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<div th:replace="~{admin/fragments/nav :: admin-nav}"></div>

<main class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Categories</h1>
        <a class="btn btn-primary" th:href="@{/admin/categories/new}">Add category</a>
    </div>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <table class="table table-striped">
        <thead><tr><th>ID</th><th>Name</th><th>Description</th><th></th></tr></thead>
        <tbody>
        <tr th:each="c : ${categories}">
            <td th:text="${c.id}">1</td>
            <td th:text="${c.name}">Name</td>
            <td th:text="${c.description} ?: '—'">—</td>
            <td class="text-end text-nowrap">
                <a class="btn btn-sm btn-outline-primary" th:href="@{/admin/categories/{id}/edit(id=${c.id})}">Edit</a>
                <form th:action="@{/admin/categories/{id}/delete(id=${c.id})}" method="post" class="d-inline"
                      onsubmit="return confirm('Delete this category?');">
                    <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>

<div th:replace="~{layout :: footer}"></div>
<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
