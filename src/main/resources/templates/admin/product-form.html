<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Product form')}"></head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<div th:replace="~{admin/fragments/nav :: admin-nav}"></div>

<main class="container" style="max-width: 640px;">
    <h1 th:text="${editMode} ? 'Edit product' : 'New product'">Product</h1>
    <form th:action="${editMode} ? @{/admin/products/{id}(id=${productForm.id})} : @{/admin/products}"
          th:object="${productForm}" method="post" class="card card-body shadow-sm">
        <div class="mb-3">
            <label class="form-label" for="name">Name</label>
            <input class="form-control" id="name" th:field="*{name}" required/>
            <div class="text-danger small" th:errors="*{name}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" for="description">Description</label>
            <textarea class="form-control" id="description" th:field="*{description}" rows="3"></textarea>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label" for="price">Price (€)</label>
                <input class="form-control" id="price" th:field="*{price}" type="number" step="0.01" min="0" required/>
                <div class="text-danger small" th:errors="*{price}"></div>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label" for="stock">Stock</label>
                <input class="form-control" id="stock" th:field="*{stock}" type="number" min="0" required/>
                <div class="text-danger small" th:errors="*{stock}"></div>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label" for="categoryId">Category</label>
            <select class="form-select" id="categoryId" th:field="*{categoryId}" required>
                <option value="">— Select —</option>
                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
            </select>
            <div class="text-danger small" th:errors="*{categoryId}"></div>
        </div>
        <button class="btn btn-primary" type="submit">Save</button>
        <a class="btn btn-link" th:href="@{/admin/products}">Cancel</a>
    </form>
</main>

<div th:replace="~{layout :: footer}"></div>
<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
