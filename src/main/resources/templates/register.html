<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Register')}"></head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<main class="container" style="max-width: 480px;">
    <h2 class="mb-3">Create account</h2>

    <form th:action="@{/register}" th:object="${registerForm}" method="post" class="card card-body shadow-sm">
        <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
            <span th:each="err : ${#fields.globalErrors()}" th:text="${err}"></span>
        </div>

        <div class="mb-3">
            <label class="form-label" for="username">Username</label>
            <input class="form-control" id="username" th:field="*{username}" type="text"/>
            <div class="text-danger small" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <input class="form-control" id="email" th:field="*{email}" type="email"/>
            <div class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" for="password">Password</label>
            <input class="form-control" id="password" th:field="*{password}" type="password"/>
            <div class="text-danger small" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" for="confirmPassword">Confirm password</label>
            <input class="form-control" id="confirmPassword" th:field="*{confirmPassword}" type="password"/>
            <div class="text-danger small" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
        </div>
        <button class="btn btn-primary w-100" type="submit">Register</button>
    </form>

    <p class="mt-3 text-center">Already have an account? <a th:href="@{/login}">Login</a></p>
</main>

<div th:replace="~{layout :: footer}"></div>
<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
